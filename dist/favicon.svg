<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="64" height="64" fill="#0a0a0a"/>
  
  <!-- Subtle pixel grid pattern -->
  <g opacity="0.05">
    <pattern id="pixelGrid" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#1a1a1a"/>
    </pattern>
    <rect width="64" height="64" fill="url(#pixelGrid)"/>
  </g>
  
  <!-- Clear S shape - top bar -->
  <rect x="18" y="18" width="28" height="8" fill="#00ff88" filter="url(#softGlow)" filter="url(#subtleShadow)"/>
  
  <!-- Clear S shape - middle connector -->
  <rect x="18" y="26" width="12" height="8" fill="#00ff88" filter="url(#softGlow)" filter="url(#subtleShadow)"/>
  
  <!-- Clear S shape - middle bar -->
  <rect x="34" y="34" width="12" height="8" fill="#00ff88" filter="url(#softGlow)" filter="url(#subtleShadow)"/>
  
  <!-- Clear S shape - bottom bar -->
  <rect x="18" y="42" width="28" height="8" fill="#00ff88" filter="url(#softGlow)" filter="url(#subtleShadow)"/>
  
  <!-- Clean S without glow for definition -->
  <rect x="18" y="18" width="28" height="8" fill="#00ff88"/>
  <rect x="18" y="26" width="12" height="8" fill="#00ff88"/>
  <rect x="34" y="34" width="12" height="8" fill="#00ff88"/>
  <rect x="18" y="42" width="28" height="8" fill="#00ff88"/>
  
  <!-- Inner highlight for subtle 3D -->
  <rect x="20" y="20" width="24" height="4" fill="#00ffaa" opacity="0.3"/>
  <rect x="20" y="28" width="8" height="4" fill="#00ffaa" opacity="0.3"/>
  <rect x="36" y="36" width="8" height="4" fill="#00ffaa" opacity="0.3"/>
  <rect x="20" y="44" width="24" height="4" fill="#00ffaa" opacity="0.3"/>
</svg>
